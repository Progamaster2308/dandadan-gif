<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dandadan Express</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Lora:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
  <script type="text/javascript">(function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);})(window, document, "clarity", "script", "wc7ikmxxuu");</script>
</head>
<body>
  <div class="dandadan-aura-overlay"></div>
  <div class="video-bg-container"><video autoplay loop muted playsinline id="bg-video-dandadan"><source src="./assets/fondo-giro.mp4" type="video/mp4"></video></div>
  <div id="toast-container" class="toast-container"></div>
  
  <header class="header">
    <div class="header-content">
      <div class="brand" id="brand-home">
        <img src="./assets/dandan.png" width="45" height="45" alt="Momo Ayase" style="flex-shrink:0;" />
        <h1 style="white-space:nowrap;">Dandadan Express</h1>
      </div>
      <nav class="steps-nav"><span class="step active" data-step-indicator="1">INICIO</span><span class="step" data-step-indicator="2">CARTA</span><span class="step" data-step-indicator="3">PAGO</span></nav>
    </div>
  </header>

  <main class="main-container">
    <section id="step-restaurante" class="panel active">
      <h2 class="section-title">¿Selecciona Tu Restaurante?</h2>
      <div class="filter-wrapper"><select id="filtro-cat"><option value="todas">TODAS LAS CATEGORÍAS</option><option value="paranormal">Paranormal (Japonesa)</option><option value="aparicion">Aparición (Americana)</option><option value="espiritual">Espiritual (Postres)</option></select></div>
      <ul id="lista-restaurantes" class="cards-grid"></ul>
    </section>

    <section id="step-productos" class="panel" hidden>
      <header class="panel-header" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;"><h2 id="titulo-restaurante">Invocaciones</h2><button type="button" class="btn-back" id="btn-volver-rest" style="width:auto; min-width:120px;">OTRO SITIO <span>&rarr;</span></button></header>
      <ul id="lista-platos" class="menu-list" style="list-style:none; padding:0;"></ul>
      <div class="cart-floating"><button type="button" id="btn-carrito" class="btn-cart-main">👽 AVISTAMIENTOS (<span id="cart-count">0</span>) <span id="cart-total-float">$0 MXN</span></button></div>
    </section>

    <section id="step-resumen" class="panel" hidden>
      <h2 class="section-title">ALTAR DE INVOCACIONES</h2>
      <ul id="lista-resumen" class="summary-list" style="list-style:none; padding:0; margin-bottom:20px;"></ul>
      <p id="resumen-vacio" class="empty-msg" style="text-align:center;">No has seleccionado nada aún.</p>
      <div class="summary-footer">
        <p class="total-display" style="text-align:center; font-size:1.6rem; color:var(--white); margin-bottom:1.5rem;">Precio Final: <strong id="total-delivery">0,00 MXN</strong></p>
        <div class="action-buttons">
          <button type="button" id="btn-comprar" class="btn-primary" style="grid-column: 1 / -1; background: var(--accent-purple);">¡INVOCAR PEDIDO!</button>
          <button type="button" class="btn-danger-outline" id="btn-vaciar">EXORCIZAR PEDIDOS</button>
          <button type="button" class="btn-back" id="btn-seguir-comprando">MÁS APARICIONES</button>
        </div>
      </div>
    </section>

    <section id="step-confirmacion" class="panel centered-panel" hidden style="text-align:center;">
      <img src="./assets/turbolisto.png" style="border-radius:50%; border:4px solid var(--accent-purple); max-width:100%; height:auto;" width="350" alt="Okarun" />
      <h2 style="color:var(--neon-pink); margin-top:1.5rem;">¡Exorcismo Cumplido!</h2>
      <p id="msg-confirm" style="font-weight:600; margin-bottom:2rem;"></p>
      <button type="button" class="btn-primary" id="btn-nuevo">NUEVA APARICIÓN</button>
    </section>
  </main>

  <footer class="footer">© 2026 Dandadan Express — Turbo Abuela Delivery</footer>
  <script src="./script.js"></script>
</body>
</html>
